<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Video Player</title>
    <style>
        body { text-align: center; padding-top: 50px; background: #f0f0f0; }
        #myVideo { 
            display: none; /* 처음엔 숨김 */
            width: 100%; 
            max-width: 600px; 
            border-radius: 10px;
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background: #000; 
            color: #fff; 
            border: none; 
            border-radius: 5px; 
        }
    </style>
</head>
<body>

    <button id="playBtn" onclick="playVideo()">영상 재생하기</button>

    <div id="videoContainer">
        <video id="myVideo" playsinline muted>
            <source src="./video.mp4" type="video/mp4">
            영상을 지원하지 않는 브라우저입니다.
        </video>
    </div>

    <script>
        function playVideo() {
            const v = document.getElementById("myVideo");
            const btn = document.getElementById("playBtn");

            // 영상 로드 시도
            v.style.display = "block";
            btn.style.display = "none";

            v.play().catch(error => {
                console.error("재생 실패:", error);
                alert("영상을 불러오지 못했습니다. 파일명을 다시 확인해주세요.");
            });
        }
    </script>
</body>
</html>
