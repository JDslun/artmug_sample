<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Video Page</title>
    <style>
        body { text-align: center; padding-top: 50px; font-family: sans-serif; }
        /* 처음에는 영상 숨기기 */
        #videoPlayer { display: none; width: 90%; max-width: 600px; margin: 20px auto; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background-color: #2ea44f; color: white; border: none; border-radius: 6px; transition: 0.3s; }
        button:hover { background-color: #2c974b; }
    </style>
</head>
<body>

    <h2>버튼을 눌러 영상을 확인하세요!</h2>
    
    <button onclick="playVideo()">영상 재생하기</button>

    <div id="videoContainer">
        <video id="videoPlayer" controls>
            <source src="video.mp4" type="video/mp4">
            브라우저가 비디오를 지원하지 않습니다.
        </video>
    </div>

    <script>
        function playVideo() {
            var v = document.getElementById("videoPlayer");
            v.style.display = "block"; // 숨겨진 비디오 보이기
            v.play(); // 재생
        }
    </script>

</body>
</html>
