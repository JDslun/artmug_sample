<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Layered Video Project</title>
    <style>
        /* 컨테이너: 모든 레이어를 겹칠 기준 */
        .container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            aspect-ratio: 16 / 9; /* 영상 비율에 맞춤 */
            overflow: hidden;
            border-radius: 12px;
        }

        /* 레이어 1: 뒷배경 이미지 */
        #bgImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1; /* 가장 뒤 */
        }

        /* 레이어 2: 앞면 영상 */
        #myVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; /* 이미지보다 위 */
            cursor: pointer;
            opacity: 0; /* 배경이 살짝 보이게 하고 싶다면 조절 */
        }
    </style>
</head>
<body>

    <div class="container">
        <img id="bgImage" src="./testBack1.png" alt="Background">

        <video id="myVideo" playsinline muted onclick="startExperience()">
            <source src="./video1.webm" type="video/webm">
        </video>
    </div>

    <script>
        function startExperience() {
            const video = document.getElementById("myVideo");
            const img = document.getElementById("bgImage");

            // 1. 영상 재생
            video.play();

            setTimeout(function() {
                document.getElementById("bgImage").src = "./testBack2.png";
            }, 1000); // 여기서 숫자를 바꿔서 시간을 조절하세요 (예: 5초 = 5000)
            
            // (선택) 재생 중에는 영상 투명도를 1로 만들어 더 뚜렷하게 함
            video.style.opacity = "1";
        }

        // 영상이 끝나면 다시 초기 상태로 돌리고 싶을 때
        document.getElementById("myVideo").onended = function() {
            this.style.opacity = "0";
            //document.getElementById("bgImage").src = "./testBack2.png";
        };
    </script>

</body>
</html>
