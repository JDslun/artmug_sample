<!DOCTYPE html>
<html>
<head>
    <style>
        #videoPlayer { display: none; width: 100%; max-width: 500px; margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <button onclick="showVideo()">영상 보기</button>

    <div id="videoContainer">
        <video id="videoPlayer" controls>
            <source src="your-video.mp4" type="video/mp4">
            브라우저가 비디오 태그를 지원하지 않습니다.
        </video>
    </div>

    <script>
        function showVideo() {
            var video = document.getElementById("videoPlayer");
            video.style.display = "block"; // 영상 나타내기
            video.play(); // 자동 재생 시작
        }
    </script>

</body>
</html>
