<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Clean Video Player</title>
    <style>
        body { 
            text-align: center; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            background-color: transparent; /* 배경을 투명하게 해서 부모 사이트와 맞춤 */
        }
        
        #videoContainer {
            position: relative;
            width: 90%;
            max-width: 640px;
        }

        /* 컨트롤러가 없는 비디오 스타일 */
        video {
            display: none; /* 처음엔 숨김 */
            width: 100%;
            border-radius: 12px;
            pointer-events: none; /* 클릭 등으로 인한 기본 동작 방지 */
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="playBtn" onclick="playCleanVideo()">영상 보기</button>

    <div id="videoContainer">
        <video id="myVideo" playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        function playCleanVideo() {
            const video = document.getElementById("myVideo");
            const btn = document.getElementById("playBtn");

            // 버튼 숨기고 영상 보여주기
            btn.style.display = "none";
            video.style.display = "block";
            
            // 재생 시작
            video.play();

            // 영상이 끝나면 다시 버튼을 보여주고 싶을 경우 (선택사항)
            video.onended = function() {
                video.style.display = "none";
                btn.style.display = "block";
            };
        }
    </script>

</body>
</html>
